name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning,Error -Settings .pssa.psd1
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "No PSScriptAnalyzer warnings or errors found." -ForegroundColor Green
